<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Meal Planner - Daftar Akun</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 m-0 p-5 flex items-center justify-center min-h-screen font-sans">

    <div class="bg-white w-full max-w-md p-8 rounded-lg shadow-md my-8">
        
        <div class="text-center mb-6">
            <h2 class="text-[#2e8b57] font-bold text-3xl m-0">Smart Meal Planner</h2>
            <div class="text-gray-500 text-sm mt-2">Mulai perjalanan hidup sehat dan hemat</div>
        </div>

        <form action="#" method="POST" class="space-y-4">
            
            <div>
                <label for="name" class="block text-xs font-bold text-[#2e8b57] tracking-wide uppercase mb-1.5">
                    👤 Nama Lengkap
                </label>
                <input type="text" id="name" name="name" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-md text-base text-gray-900 focus:outline-none focus:border-[#2e8b57] focus:bg-white transition-all duration-200"
                    placeholder="Nama lengkap Anda">
            </div>

            <div>
                <label for="email" class="block text-xs font-bold text-[#2e8b57] tracking-wide uppercase mb-1.5">
                    📧 Alamat Email
                </label>
                <input type="email" id="email" name="email" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-md text-base text-gray-900 focus:outline-none focus:border-[#2e8b57] focus:bg-white transition-all duration-200"
                    placeholder="nama@email.com">
            </div>

            <div>
                <label for="password" class="block text-xs font-bold text-[#2e8b57] tracking-wide uppercase mb-1.5">
                    🔒 Kata Sandi
                </label>
                <input type="password" id="password" name="password" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-md text-base text-gray-900 focus:outline-none focus:border-[#2e8b57] focus:bg-white transition-all duration-200"
                    placeholder="Minimal 8 karakter">
            </div>

            <div>
                <label for="password_confirmation" class="block text-xs font-bold text-[#2e8b57] tracking-wide uppercase mb-1.5">
                    🔄 Konfirmasi Kata Sandi
                </label>
                <input type="password" id="password_confirmation" name="password_confirmation" required
                    class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-md text-base text-gray-900 focus:outline-none focus:border-[#2e8b57] focus:bg-white transition-all duration-200"
                    placeholder="Ulangi kata sandi Anda">
            </div>

            <div class="flex items-start pt-1">
                <input type="checkbox" id="terms" name="terms" required
                    class="mt-1 w-4 h-4 text-[#2e8b57] border-gray-300 rounded focus:ring-[#2e8b57] accent-[#2e8b57]">
                <label for="terms" class="ml-2 text-sm text-gray-600 select-none">
                    Saya menyetujui <a href="#" class="text-[#2e8b57] font-medium hover:underline">Syarat & Ketentuan</a> serta <a href="#" class="text-[#2e8b57] font-medium hover:underline">Kebijakan Privasi</a> yang berlaku.
                </label>
            </div>

            <div class="pt-3">
                <button type="submit" 
                    class="w-full py-3 bg-[#2e8b57] text-white font-bold text-base rounded shadow-md shadow-green-700/20 hover:opacity-90 transition-opacity focus:outline-none">
                    Daftar Akun Baru
                </button>
            </div>
        </form>

        <div class="relative flex py-4 items-center my-2">
            <div class="flex-grow border-t border-gray-200"></div>
            <span class="flex-shrink mx-4 text-gray-400 text-xs uppercase tracking-wider">Atau</span>
            <div class="flex-grow border-t border-gray-200"></div>
        </div>

        <div class="text-center text-sm text-gray-600">
            Sudah punya akun? 
            <a href="#" class="font-bold text-[#2e8b57] hover:underline ml-1">
                Masuk di sini
            </a>
        </div>

    </div>

</body>
</html>
