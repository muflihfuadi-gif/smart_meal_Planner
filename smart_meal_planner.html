<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Meal Planner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex justify-center px-4 py-8">

  <div class="bg-white w-full max-w-md rounded-lg shadow-md p-8 mt-6">

    <!-- Judul -->
    <h2 class="text-2xl font-bold text-center text-green-700 mb-5">Smart Meal Planner</h2>

    <!-- Kotak Promo -->
    <div class="bg-orange-50 border-l-4 border-orange-400 px-4 py-3 mb-6 rounded-r">
      <h3 class="text-sm font-bold text-red-700 mb-1">Rencanakan Menu Praktis & Sehat!</h3>
      <p class="text-xs text-gray-500">Bantu kamu menyusun menu mingguan yang lezat sesuai dengan jumlah orang dan budget kamu.</p>
    </div>

    <!-- Form -->
    <form action="#" method="POST">

      <!-- Jumlah Individu -->
      <div class="mb-4">
        <label class="block text-sm font-bold text-gray-700 mb-1">Jumlah Individu</label>
        <input
          type="number"
          placeholder="Contoh: 2"
          min="1"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-green-600 text-sm"
        >
      </div>

      <!-- Budget Mingguan -->
      <div class="mb-4">
        <label class="block text-sm font-bold text-gray-700 mb-1">Budget Mingguan (Rp)</label>
        <input
          type="number"
          placeholder="Contoh: 300000"
          min="1"
          required
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-green-600 text-sm"
        >
      </div>

      <!-- Mode Nutrisi -->
      <div class="mb-4">
        <label class="block text-sm font-bold text-gray-700 mb-1">Mode Nutrisi</label>
        <select
          required
          class="w-full px-3 py-2 border border-gray-300 rounded focus:outline-none focus:border-green-600 text-sm bg-white"
        >
          <option value="" disabled selected>Pilih mode menu</option>
          <option value="hemat">Hemat</option>
          <option value="seimbang">Seimbang</option>
        </select>
      </div>

      <!-- Tombol -->
      <div class="flex justify-end gap-3 mt-6">
        <button
          type="submit"
          class="px-4 py-2 bg-gray-200 text-gray-700 rounded text-sm cursor-pointer hover:opacity-80"
        >
          Cek Kelengkapan
        </button>
        <button
          type="button"
          class="px-4 py-2 bg-green-700 text-white font-bold rounded text-sm cursor-pointer hover:opacity-80"
        >
          Lanjut ke Step 2
        </button>
      </div>

    </form>
  </div>

</body>
</html>
